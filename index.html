<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBC 2026</title>
    <link rel="icon" type="image/x-icon" href="favicon2.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --background: #050505;
            --foreground: #f4f4f5;
            --surface: #09090b;
            --surface-raised: #101012;
            --muted: #8f8f98;
            --border: #27272a;
            --border-strong: #52525b;
            --radius: 0.75rem;
            --font-sans: "Geist", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            background: var(--background);
            scroll-behavior: smooth;
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 82% -8%, rgba(255, 255, 255, 0.09), transparent 27rem),
                var(--background);
            color: var(--foreground);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body::before {
            position: fixed;
            z-index: -1;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 4rem 4rem;
            content: "";
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, black, transparent 75%);
            mask-image: linear-gradient(to bottom, black, transparent 75%);
        }

        body.modal-open {
            overflow: hidden;
        }

        button,
        video {
            font: inherit;
        }

        button {
            color: inherit;
        }

        img {
            display: block;
            max-width: 100%;
        }

        ::selection {
            background: var(--foreground);
            color: var(--background);
        }

        .site-frame {
            width: min(100% - 2rem, 100rem);
            min-height: 100vh;
            margin-inline: auto;
            border-inline: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.72);
        }

        .masthead {
            position: relative;
            display: flex;
            min-height: clamp(16rem, 26vw, 26rem);
            align-items: flex-end;
            overflow: hidden;
            padding: clamp(1.25rem, 3.5vw, 3.5rem);
            border-bottom: 1px solid var(--border);
        }

        .masthead::before {
            position: absolute;
            top: clamp(-8rem, -8vw, -3rem);
            right: clamp(2rem, 12vw, 12rem);
            width: clamp(12rem, 22vw, 22rem);
            aspect-ratio: 1;
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 50%;
            box-shadow:
                0 0 0 clamp(1.5rem, 3vw, 3rem) rgba(255, 255, 255, 0.018),
                0 0 0 clamp(3rem, 6vw, 6rem) rgba(255, 255, 255, 0.012);
            content: "";
        }

        .masthead::after {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 36%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border));
            content: "";
        }

        .masthead__rail {
            position: relative;
            z-index: 1;
            display: grid;
            width: 100%;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid var(--border-strong);
            animation: enter 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .identity {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
            padding: 1rem 0;
            color: #c5c5ca;
            font-family: var(--font-mono);
            font-size: clamp(0.65rem, 0.75vw, 0.75rem);
            font-weight: 400;
            letter-spacing: 0.025em;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .identity::before {
            width: 0.4rem;
            height: 0.4rem;
            flex: 0 0 auto;
            background: var(--foreground);
            content: "";
        }

        .identity:first-child {
            padding-right: 1.5rem;
            border-right: 1px solid var(--border);
        }

        .identity:last-child {
            padding-left: 1.5rem;
        }

        .project {
            display: grid;
            min-height: clamp(37rem, 53vw, 49rem);
            grid-template-columns: minmax(16rem, 36%) minmax(0, 64%);
            border-bottom: 1px solid var(--border);
        }

        .project:nth-child(even) {
            grid-template-columns: minmax(0, 64%) minmax(16rem, 36%);
        }

        .project__header {
            position: relative;
            display: flex;
            min-width: 0;
            align-items: flex-end;
            padding: clamp(2rem, 4vw, 4rem);
            border-right: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.48);
        }

        .project__header::before {
            position: absolute;
            top: clamp(2rem, 4vw, 4rem);
            left: clamp(2rem, 4vw, 4rem);
            width: clamp(2.5rem, 5vw, 5rem);
            height: 1px;
            background: currentColor;
            content: "";
            opacity: 0.55;
        }

        .project__heading {
            max-width: 9ch;
            margin: 0;
            font-size: clamp(2.75rem, 4.5vw, 5.75rem);
            font-weight: 500;
            hyphens: auto;
            letter-spacing: -0.065em;
            line-height: 0.9;
            text-wrap: balance;
        }

        .project__body {
            display: flex;
            min-width: 0;
            align-items: center;
            padding: clamp(1.25rem, 3.5vw, 3.5rem);
        }

        .project:nth-child(odd) .project__header {
            grid-column: 1;
            grid-row: 1;
        }

        .project:nth-child(odd) .project__body {
            grid-column: 2;
            grid-row: 1;
        }

        .project:nth-child(even) .project__header {
            grid-column: 2;
            grid-row: 1;
            border-right: 0;
            border-left: 1px solid var(--border);
            background: var(--foreground);
            color: var(--background);
        }

        .project:nth-child(even) .project__body {
            grid-column: 1;
            grid-row: 1;
        }

        .video-card {
            width: 100%;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.28);
            animation: enter 750ms 100ms cubic-bezier(0.22, 1, 0.36, 1) both;
            transition:
                border-color 250ms ease,
                transform 350ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 350ms ease;
        }

        .project:nth-child(even) .video-card {
            animation-delay: 180ms;
        }

        .video-card:hover,
        .video-card:focus-within {
            border-color: var(--border-strong);
            box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.44);
            transform: translateY(-0.25rem);
        }

        .video-trigger {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: #0c0c0e;
            cursor: pointer;
        }

        .video-trigger::after {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.48), transparent 42%);
            content: "";
            pointer-events: none;
            transition: opacity 250ms ease;
        }

        .video-trigger:focus-visible {
            z-index: 1;
            outline: 2px solid var(--foreground);
            outline-offset: -4px;
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.08) brightness(0.77);
            transform: scale(1.002);
            transition:
                filter 450ms ease,
                transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .video-trigger:hover .video-thumbnail,
        .video-trigger:focus-visible .video-thumbnail {
            filter: grayscale(1) contrast(1.04) brightness(0.9);
            transform: scale(1.025);
        }

        .video-trigger:hover::after,
        .video-trigger:focus-visible::after {
            opacity: 0.72;
        }

        .play-control {
            position: absolute;
            z-index: 1;
            bottom: clamp(1rem, 2.2vw, 2rem);
            left: clamp(1rem, 2.2vw, 2rem);
            display: grid;
            width: clamp(3.5rem, 5.5vw, 5rem);
            aspect-ratio: 1;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            background: rgba(244, 244, 245, 0.96);
            color: #09090b;
            box-shadow: 0 0.75rem 2.5rem rgba(0, 0, 0, 0.28);
            transition:
                background-color 250ms ease,
                color 250ms ease,
                transform 350ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .play-control svg {
            width: 28%;
            height: 28%;
            margin-left: 0.2rem;
            fill: currentColor;
        }

        .video-trigger:hover .play-control,
        .video-trigger:focus-visible .play-control {
            background: #09090b;
            color: var(--foreground);
            transform: scale(1.08);
        }

        .project__title {
            display: flex;
            min-height: clamp(6.5rem, 9vw, 9rem);
            align-items: center;
            margin: 0;
            padding: clamp(1.35rem, 2.8vw, 2.5rem);
            border-top: 1px solid var(--border);
            font-size: clamp(1.35rem, 2vw, 2rem);
            font-weight: 450;
            letter-spacing: -0.035em;
            line-height: 1.08;
            text-wrap: balance;
        }

        .video-modal {
            position: fixed;
            z-index: 100;
            inset: 0;
            display: grid;
            visibility: hidden;
            place-items: center;
            padding: clamp(1rem, 4vw, 4rem);
            background: rgba(3, 3, 3, 0.92);
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(1.25rem);
            transition:
                opacity 250ms ease,
                visibility 250ms ease;
        }

        .video-modal.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .video-modal__frame {
            width: min(100%, 87.5rem);
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: #000;
            box-shadow: 0 2rem 8rem rgba(0, 0, 0, 0.72);
            transform: translateY(0.75rem) scale(0.985);
            transition: transform 350ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .video-modal.active .video-modal__frame {
            transform: translateY(0) scale(1);
        }

        .video-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: calc(var(--radius) - 1px);
            background: #000;
            object-fit: contain;
        }

        .video-modal__close {
            position: fixed;
            z-index: 1;
            top: clamp(1rem, 2vw, 2rem);
            right: clamp(1rem, 2vw, 2rem);
            display: grid;
            width: 2.75rem;
            aspect-ratio: 1;
            place-items: center;
            padding: 0;
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            background: rgba(9, 9, 11, 0.82);
            color: var(--foreground);
            cursor: pointer;
            transition:
                background-color 200ms ease,
                color 200ms ease,
                transform 200ms ease;
        }

        .video-modal__close:hover,
        .video-modal__close:focus-visible {
            background: var(--foreground);
            color: var(--background);
            transform: rotate(90deg);
        }

        .video-modal__close:focus-visible {
            outline: 2px solid var(--foreground);
            outline-offset: 3px;
        }

        .video-modal__close svg {
            width: 1rem;
            height: 1rem;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-width: 1.75;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(1rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 56.25rem) {
            .masthead {
                min-height: 15rem;
            }

            .masthead::after {
                left: 50%;
            }

            .project,
            .project:nth-child(even) {
                min-height: auto;
                grid-template-columns: 1fr;
            }

            .project .project__header,
            .project:nth-child(even) .project__header {
                grid-column: 1;
                grid-row: auto;
                min-height: 17rem;
                border-right: 0;
                border-bottom: 1px solid var(--border);
                border-left: 0;
            }

            .project .project__body,
            .project:nth-child(even) .project__body {
                grid-column: 1;
                grid-row: auto;
            }

            .project__heading {
                max-width: 11ch;
                font-size: clamp(3.5rem, 10vw, 5.5rem);
            }
        }

        @media (max-width: 40rem) {
            body::before {
                background-size: 2.5rem 2.5rem;
            }

            .site-frame {
                width: 100%;
                border-inline: 0;
            }

            .masthead {
                min-height: 18rem;
                padding: 1rem;
            }

            .masthead::before {
                top: -5rem;
                right: -3rem;
            }

            .masthead::after {
                display: none;
            }

            .masthead__rail {
                grid-template-columns: 1fr;
            }

            .identity {
                padding: 0.85rem 0;
                font-size: 0.625rem;
                overflow-wrap: anywhere;
            }

            .identity:first-child {
                padding-right: 0;
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .identity:last-child {
                padding-left: 0;
            }

            .project .project__header,
            .project:nth-child(even) .project__header {
                min-height: 14rem;
                padding: 1.5rem 1rem;
            }

            .project__header::before {
                top: 1.5rem;
                left: 1rem;
            }

            .project__heading {
                max-width: 10ch;
                font-size: clamp(2.9rem, 14vw, 4.25rem);
            }

            .project__body {
                padding: 1rem;
            }

            .video-card {
                border-radius: 0.625rem;
            }

            .project__title {
                min-height: 7rem;
                padding: 1.25rem;
                font-size: 1.25rem;
            }

            .video-modal {
                padding: 0.75rem;
            }

            .video-modal__frame {
                border-radius: 0.625rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="site-frame">
        <header class="masthead">
            <div class="masthead__rail">
                <p class="identity">Profesor: DAVID SANTIAGO ALARCON GARCIA</p>
                <p class="identity">Alumno: LUIS FELIPE FERNANDEZ GURROLA</p>
            </div>
        </header>

        <main>
            <article class="project">
                <header class="project__header">
                    <h2 class="project__heading">Arquitectura en la Nube I</h2>
                </header>

                <div class="project__body">
                    <div class="video-card">
                        <button class="video-trigger" type="button" data-video="insert-rds.mp4">
                            <img src="insert-rds.png" alt="Insert RDS - Arquitectura en la Nube I" class="video-thumbnail">
                            <span class="play-control" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M8 5.2v13.6L19 12 8 5.2Z"></path>
                                </svg>
                            </span>
                        </button>
                        <h3 class="project__title">Integración serverless de AWS Lambda con Amazon RDS usando Python</h3>
                    </div>
                </div>
            </article>

            <article class="project">
                <header class="project__header">
                    <h2 class="project__heading">Fundamentos de la Nube</h2>
                </header>

                <div class="project__body">
                    <div class="video-card">
                        <button class="video-trigger" type="button" data-video="punto-extra.mp4">
                            <img src="django-expuesto.png" alt="Fundamentos de la Nube" class="video-thumbnail">
                            <span class="play-control" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M8 5.2v13.6L19 12 8 5.2Z"></path>
                                </svg>
                            </span>
                        </button>
                        <h3 class="project__title">Despliegue de una instancia EC2 con Django accesible desde Internet</h3>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div id="videoModal" class="video-modal" role="dialog" aria-modal="true" aria-hidden="true">
        <button class="video-modal__close" type="button" aria-label="Cerrar video">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
        </button>
        <div class="video-modal__frame">
            <video id="videoFrame" class="video-frame" controls playsinline></video>
        </div>
    </div>

    <script>
        const modal = document.getElementById("videoModal");
        const videoFrame = document.getElementById("videoFrame");
        const closeButton = modal.querySelector(".video-modal__close");
        const videoTriggers = document.querySelectorAll(".video-trigger");
        let activeTrigger = null;

        function openVideoModal(videoUrl, trigger) {
            activeTrigger = trigger;
            videoFrame.src = videoUrl;
            modal.classList.add("active");
            modal.setAttribute("aria-hidden", "false");
            document.body.classList.add("modal-open");
            closeButton.focus();
            videoFrame.play().catch(() => {});
        }

        function closeVideoModal() {
            if (!modal.classList.contains("active")) return;

            videoFrame.pause();
            videoFrame.removeAttribute("src");
            videoFrame.load();
            modal.classList.remove("active");
            modal.setAttribute("aria-hidden", "true");
            document.body.classList.remove("modal-open");
            activeTrigger?.focus();
            activeTrigger = null;
        }

        videoTriggers.forEach((trigger) => {
            trigger.addEventListener("click", () => {
                openVideoModal(trigger.dataset.video, trigger);
            });
        });

        closeButton.addEventListener("click", closeVideoModal);

        modal.addEventListener("click", (event) => {
            if (event.target === modal) closeVideoModal();
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") closeVideoModal();
        });
    </script>
</body>
</html>
