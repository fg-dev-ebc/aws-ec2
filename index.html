<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBC 2026</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23050505'/%3E%3Cpath d='M24 18 10 32l14 14M40 18l14 14-14 14M38 11 27 53' fill='none' stroke='%23fff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        document.documentElement.dataset.theme = "dark";
    </script>
    <style>
        :root {
            color-scheme: dark;
            --background: #050505;
            --foreground: #f4f4f5;
            --surface: #09090b;
            --surface-raised: #101012;
            --muted: #8f8f98;
            --border: #27272a;
            --border-strong: #52525b;
            --ambient: rgba(255, 255, 255, 0.09);
            --grid-line: rgba(255, 255, 255, 0.025);
            --frame: rgba(5, 5, 5, 0.72);
            --header-surface: rgba(9, 9, 11, 0.48);
            --identity: #c5c5ca;
            --ring: rgba(255, 255, 255, 0.13);
            --ring-soft: rgba(255, 255, 255, 0.018);
            --ring-faint: rgba(255, 255, 255, 0.012);
            --card-shadow: rgba(0, 0, 0, 0.28);
            --card-shadow-hover: rgba(0, 0, 0, 0.44);
            --radius: 0.75rem;
            --font-sans: "Geist", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --background: #f1f1ee;
            --foreground: #111113;
            --surface: #fafaf9;
            --surface-raised: #ffffff;
            --muted: #66666d;
            --border: #d5d5d1;
            --border-strong: #8b8b90;
            --ambient: rgba(0, 0, 0, 0.07);
            --grid-line: rgba(0, 0, 0, 0.035);
            --frame: rgba(241, 241, 238, 0.78);
            --header-surface: rgba(250, 250, 249, 0.52);
            --identity: #4f4f56;
            --ring: rgba(0, 0, 0, 0.14);
            --ring-soft: rgba(0, 0, 0, 0.025);
            --ring-faint: rgba(0, 0, 0, 0.016);
            --card-shadow: rgba(24, 24, 27, 0.12);
            --card-shadow-hover: rgba(24, 24, 27, 0.2);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            background: var(--background);
            scroll-behavior: smooth;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 2;
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 82% -8%, var(--ambient), transparent 27rem),
                var(--background);
            color: var(--foreground);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            transition: background-color 450ms ease, color 450ms ease;
        }

        body::before {
            position: fixed;
            z-index: -1;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 4rem 4rem;
            content: "";
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, black, transparent 75%);
            mask-image: linear-gradient(to bottom, black, transparent 75%);
        }

        body.modal-open {
            overflow: hidden;
        }

        button,
        video {
            font: inherit;
        }

        button {
            color: inherit;
        }

        img {
            display: block;
            max-width: 100%;
        }

        ::selection {
            background: var(--foreground);
            color: var(--background);
        }

        .site-frame {
            width: min(100% - 2rem, 100rem);
            min-height: 100vh;
            margin-inline: auto;
            border-inline: 1px solid var(--border);
            background: var(--frame);
            transition: background-color 450ms ease, border-color 450ms ease;
        }

        .masthead {
            position: relative;
            display: flex;
            min-height: clamp(16rem, 26vw, 26rem);
            align-items: flex-end;
            overflow: hidden;
            padding: clamp(1.25rem, 3.5vw, 3.5rem);
            border-bottom: 1px solid var(--border);
        }

        .masthead__rail {
            position: relative;
            z-index: 1;
            display: grid;
            width: 100%;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid var(--border-strong);
            animation: enter 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .identity {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
            padding: 1rem 0;
            color: var(--identity);
            font-family: var(--font-mono);
            font-size: clamp(0.65rem, 0.75vw, 0.75rem);
            font-weight: 400;
            letter-spacing: 0.025em;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .theme-toggle {
            position: absolute;
            z-index: 1;
            top: clamp(-8rem, -8vw, -3rem);
            right: clamp(2rem, 12vw, 12rem);
            width: clamp(12rem, 22vw, 22rem);
            aspect-ratio: 1;
            padding: 0;
            border: 1px solid var(--ring);
            border-radius: 50%;
            background: transparent;
            box-shadow:
                0 0 0 clamp(1.5rem, 3vw, 3rem) var(--ring-soft),
                0 0 0 clamp(3rem, 6vw, 6rem) var(--ring-faint);
            cursor: pointer;
            transition:
                border-color 250ms ease,
                transform 250ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .theme-toggle:hover {
            border-color: var(--border-strong);
            transform: scale(1.015);
        }

        .theme-toggle:focus-visible {
            outline: 2px solid var(--foreground);
            outline-offset: 4px;
        }

        .identity::before {
            width: 0.4rem;
            height: 0.4rem;
            flex: 0 0 auto;
            background: var(--foreground);
            content: "";
        }

        .identity:first-child {
            padding-right: 1.5rem;
        }

        .identity:last-child {
            padding-left: 1.5rem;
        }

        .project {
            display: grid;
            min-height: clamp(37rem, 53vw, 49rem);
            grid-template-columns: minmax(16rem, 36%) minmax(0, 64%);
            border-bottom: 1px solid var(--border);
        }

        .project:nth-child(even) {
            grid-template-columns: minmax(0, 64%) minmax(16rem, 36%);
        }

        .project__header {
            position: relative;
            display: flex;
            min-width: 0;
            align-items: flex-end;
            overflow: hidden;
            padding: clamp(2rem, 4vw, 4rem);
            border-right: 1px solid var(--border);
            background: var(--header-surface);
        }

        .project__header::before {
            position: absolute;
            top: clamp(2rem, 4vw, 4rem);
            left: clamp(2rem, 4vw, 4rem);
            width: clamp(2.5rem, 5vw, 5rem);
            height: 1px;
            background: currentColor;
            content: "";
            opacity: 0.55;
        }

        .project__heading {
            position: relative;
            z-index: 1;
            max-width: 9ch;
            margin: 0;
            font-size: clamp(2.75rem, 4.5vw, 5.75rem);
            font-weight: 500;
            hyphens: auto;
            letter-spacing: -0.065em;
            line-height: 0.9;
            text-wrap: balance;
        }

        .project__body {
            display: flex;
            min-width: 0;
            align-items: center;
            padding: clamp(1.25rem, 3.5vw, 3.5rem);
        }

        .project:nth-child(odd) .project__header {
            grid-column: 1;
            grid-row: 1;
        }

        .project:nth-child(odd) .project__body {
            grid-column: 2;
            grid-row: 1;
        }

        .project:nth-child(even) .project__header {
            grid-column: 2;
            grid-row: 1;
            border-right: 0;
            border-left: 1px solid var(--border);
            background: var(--foreground);
            color: var(--background);
        }

        .project:nth-child(even) .project__body {
            grid-column: 1;
            grid-row: 1;
        }

        .video-card {
            width: 100%;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: 0 1.5rem 5rem var(--card-shadow);
            animation: enter 750ms 100ms cubic-bezier(0.22, 1, 0.36, 1) both;
            transition:
                border-color 250ms ease,
                transform 350ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 350ms ease;
        }

        .project:nth-child(even) .video-card {
            animation-delay: 180ms;
        }

        .video-card:hover,
        .video-card:focus-within {
            border-color: var(--border-strong);
            box-shadow: 0 2rem 6rem var(--card-shadow-hover);
            transform: translateY(-0.25rem);
        }

        .video-trigger {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: #0c0c0e;
            cursor: pointer;
        }

        .video-trigger:focus-visible {
            z-index: 1;
            outline: 2px solid var(--foreground);
            outline-offset: -4px;
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.002);
            transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .video-trigger:hover .video-thumbnail,
        .video-trigger:focus-visible .video-thumbnail {
            transform: scale(1.025);
        }

        .play-control {
            position: absolute;
            z-index: 1;
            bottom: clamp(1rem, 2.2vw, 2rem);
            left: clamp(1rem, 2.2vw, 2rem);
            display: grid;
            width: clamp(3.5rem, 5.5vw, 5rem);
            aspect-ratio: 1;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            background: rgba(244, 244, 245, 0.96);
            color: #09090b;
            box-shadow: 0 0.75rem 2.5rem rgba(0, 0, 0, 0.28);
            transition:
                background-color 250ms ease,
                color 250ms ease,
                transform 350ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .play-control svg {
            width: 28%;
            height: 28%;
            margin-left: 0.2rem;
            fill: currentColor;
        }

        .video-trigger:hover .play-control,
        .video-trigger:focus-visible .play-control {
            background: #09090b;
            color: #f4f4f5;
            transform: scale(1.08);
        }

        .project__title {
            display: flex;
            min-height: clamp(6.5rem, 9vw, 9rem);
            align-items: center;
            margin: 0;
            padding: clamp(1.35rem, 2.8vw, 2.5rem);
            border-top: 1px solid var(--border);
            font-size: clamp(1.35rem, 2vw, 2rem);
            font-weight: 450;
            letter-spacing: -0.035em;
            line-height: 1.08;
            text-wrap: balance;
        }

        .video-modal {
            position: fixed;
            z-index: 100;
            inset: 0;
            display: grid;
            visibility: hidden;
            place-items: center;
            padding: clamp(1rem, 4vw, 4rem);
            background: rgba(3, 3, 3, 0.92);
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(1.25rem);
            transition:
                opacity 250ms ease,
                visibility 250ms ease;
        }

        .video-modal.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .video-modal__frame {
            width: min(100%, 87.5rem);
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: #000;
            box-shadow: 0 2rem 8rem rgba(0, 0, 0, 0.72);
            transform: translateY(0.75rem) scale(0.985);
            transition: transform 350ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .video-modal.active .video-modal__frame {
            transform: translateY(0) scale(1);
        }

        .video-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: calc(var(--radius) - 1px);
            background: #000;
            object-fit: contain;
        }

        .video-modal__close {
            position: fixed;
            z-index: 1;
            top: clamp(1rem, 2vw, 2rem);
            right: clamp(1rem, 2vw, 2rem);
            display: grid;
            width: 2.75rem;
            aspect-ratio: 1;
            place-items: center;
            padding: 0;
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            background: rgba(9, 9, 11, 0.82);
            color: var(--foreground);
            cursor: pointer;
            transition:
                background-color 200ms ease,
                color 200ms ease,
                transform 200ms ease;
        }

        .video-modal__close:hover,
        .video-modal__close:focus-visible {
            background: var(--foreground);
            color: var(--background);
            transform: rotate(90deg);
        }

        .video-modal__close:focus-visible {
            outline: 2px solid var(--foreground);
            outline-offset: 3px;
        }

        .video-modal__close svg {
            width: 1rem;
            height: 1rem;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-width: 1.75;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(1rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 56.25rem) {
            .masthead {
                min-height: 15rem;
            }

            .project,
            .project:nth-child(even) {
                min-height: auto;
                grid-template-columns: 1fr;
            }

            .project:nth-child(odd) .project__header,
            .project:nth-child(even) .project__header {
                grid-column: 1;
                grid-row: auto;
                min-height: 17rem;
                border-right: 0;
                border-bottom: 1px solid var(--border);
                border-left: 0;
            }

            .project:nth-child(odd) .project__body,
            .project:nth-child(even) .project__body {
                grid-column: 1;
                grid-row: auto;
            }

            .project__heading {
                max-width: 11ch;
                font-size: clamp(3.5rem, 10vw, 5.5rem);
            }
        }

        @media (max-width: 40rem) {
            body::before {
                background-size: 2.5rem 2.5rem;
            }

            .site-frame {
                width: 100%;
                border-inline: 0;
            }

            .masthead {
                min-height: 18rem;
                padding: 1rem;
            }

            .theme-toggle {
                top: -5rem;
                right: -3rem;
            }

            .masthead__rail {
                grid-template-columns: 1fr;
            }

            .identity {
                padding: 0.85rem 0;
                font-size: 0.625rem;
                overflow-wrap: anywhere;
            }

            .identity:first-child {
                padding-right: 0;
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .identity:last-child {
                padding-left: 0;
            }

            .project:nth-child(odd) .project__header,
            .project:nth-child(even) .project__header {
                min-height: 14rem;
                padding: 1.5rem 1rem;
            }

            .project__header::before {
                top: 1.5rem;
                left: 1rem;
            }

            .project__heading {
                max-width: 10ch;
                font-size: clamp(2.9rem, 14vw, 4.25rem);
            }

            .project__body {
                padding: 1rem;
            }

            .video-card {
                border-radius: 0.625rem;
            }

            .project__title {
                min-height: 7rem;
                padding: 1.25rem;
                font-size: 1.25rem;
            }

            .video-modal {
                padding: 0.75rem;
            }

            .video-modal__frame {
                border-radius: 0.625rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="site-frame">
        <header class="masthead">
            <button class="theme-toggle" type="button" aria-label="Cambiar tema" aria-pressed="false"></button>
            <div class="masthead__rail">
                <p class="identity">Profesor: DAVID SANTIAGO ALARCON GARCIA</p>
                <p class="identity">Alumno: LUIS FELIPE FERNANDEZ GURROLA</p>
            </div>
        </header>

        <main>
            <article class="project">
                <header class="project__header">
                    <h2 class="project__heading">Arquitectura en la Nube I</h2>
                </header>

                <div class="project__body">
                    <div class="video-card">
                        <button class="video-trigger" type="button" data-video="insert-rds.mp4">
                            <img src="insert-rds.png" alt="Insert RDS - Arquitectura en la Nube I" class="video-thumbnail">
                            <span class="play-control" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M8 5.2v13.6L19 12 8 5.2Z"></path>
                                </svg>
                            </span>
                        </button>
                        <h3 class="project__title">Integración serverless de AWS Lambda con Amazon RDS usando Python</h3>
                    </div>
                </div>
            </article>

            <article class="project">
                <header class="project__header">
                    <h2 class="project__heading">Fundamentos de la Nube</h2>
                </header>

                <div class="project__body">
                    <div class="video-card">
                        <button class="video-trigger" type="button" data-video="punto-extra.mp4">
                            <img src="django-expuesto.png" alt="Fundamentos de la Nube" class="video-thumbnail">
                            <span class="play-control" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M8 5.2v13.6L19 12 8 5.2Z"></path>
                                </svg>
                            </span>
                        </button>
                        <h3 class="project__title">Despliegue de una instancia EC2 con Django accesible desde Internet</h3>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div id="videoModal" class="video-modal" role="dialog" aria-modal="true" aria-hidden="true">
        <button class="video-modal__close" type="button" aria-label="Cerrar video">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
        </button>
        <div class="video-modal__frame">
            <video id="videoFrame" class="video-frame" controls playsinline></video>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const themeToggle = document.querySelector(".theme-toggle");
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

        function applyTheme(theme) {
            root.dataset.theme = theme;
            themeToggle.setAttribute("aria-pressed", String(theme === "light"));
        }

        themeToggle.setAttribute("aria-pressed", String(root.dataset.theme === "light"));

        themeToggle.addEventListener("click", (event) => {
            const nextTheme = root.dataset.theme === "light" ? "dark" : "light";

            if (!document.startViewTransition || reduceMotion.matches) {
                applyTheme(nextTheme);
                return;
            }

            const bounds = event.currentTarget.getBoundingClientRect();
            const x = bounds.left + bounds.width / 2;
            const y = bounds.top + bounds.height / 2;
            const radius = Math.hypot(
                Math.max(x, window.innerWidth - x),
                Math.max(y, window.innerHeight - y)
            );
            const transition = document.startViewTransition(() => applyTheme(nextTheme));

            transition.ready.then(() => {
                root.animate(
                    {
                        clipPath: [
                            `circle(0px at ${x}px ${y}px)`,
                            `circle(${radius}px at ${x}px ${y}px)`
                        ]
                    },
                    {
                        duration: 650,
                        easing: "cubic-bezier(0.22, 1, 0.36, 1)",
                        fill: "forwards",
                        pseudoElement: "::view-transition-new(root)"
                    }
                );
            });
        });

        const modal = document.getElementById("videoModal");
        const videoFrame = document.getElementById("videoFrame");
        const closeButton = modal.querySelector(".video-modal__close");
        const videoTriggers = document.querySelectorAll(".video-trigger");
        let activeTrigger = null;

        function openVideoModal(videoUrl, trigger) {
            activeTrigger = trigger;
            videoFrame.src = videoUrl;
            modal.classList.add("active");
            modal.setAttribute("aria-hidden", "false");
            document.body.classList.add("modal-open");
            closeButton.focus();
            videoFrame.play().catch(() => {});
        }

        function closeVideoModal() {
            if (!modal.classList.contains("active")) return;

            videoFrame.pause();
            videoFrame.removeAttribute("src");
            videoFrame.load();
            modal.classList.remove("active");
            modal.setAttribute("aria-hidden", "true");
            document.body.classList.remove("modal-open");
            activeTrigger?.focus();
            activeTrigger = null;
        }

        videoTriggers.forEach((trigger) => {
            trigger.addEventListener("click", () => {
                openVideoModal(trigger.dataset.video, trigger);
            });
        });

        closeButton.addEventListener("click", closeVideoModal);

        modal.addEventListener("click", (event) => {
            if (event.target === modal) closeVideoModal();
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") closeVideoModal();
        });
    </script>
</body>
</html>
